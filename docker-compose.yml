services:
  # ---------------------------------------------------------------------------
  # Infrastructure: Nostr Relay + Blossom blob storage
  # ---------------------------------------------------------------------------
  relay:
    image: scsibug/nostr-rs-relay:latest
    profiles: [dev]
    volumes:
      - ./config/relay.toml:/usr/src/app/config.toml:ro
      - relay-data:/usr/src/app/db
    ports:
      - "${GT_RELAY_PORT:-7777}:7000"
    # Note: no healthcheck — scsibug/nostr-rs-relay is a minimal image
    # without curl/wget/nc/bash. The relay is considered "ready" once
    # the container starts. The deacon's spool handles relay unavailability.
    restart: unless-stopped

  blossom:
    image: ghcr.io/hzrd149/blossom-server:latest
    profiles: [dev]
    environment:
      DATA_DIR: /data
      PORT: "3000"
      # Optional: restrict uploads to known pubkeys
      # AUTHORIZED_PUBKEYS: "${GT_BLOSSOM_PUBKEYS:-}"
    volumes:
      - blossom-data:/data
    ports:
      - "${GT_BLOSSOM_PORT:-8005}:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Gas Town services
  # ---------------------------------------------------------------------------
  deacon:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${GT_VERSION:-dev}
        COMMIT: ${GT_COMMIT:-unknown}
        BUILD_TIME: ${GT_BUILD_TIME:-1970-01-01T00:00:00Z}
    image: gastown:local
    command: ["daemon", "run"]
    environment:
      GT_RIG: ${GT_RIG:-gastown}

      # Rig-rooted town root (as required)
      GT_TOWN_ROOT: /gt/${GT_RIG:-gastown}
      GT_ROOT: /gt/${GT_RIG:-gastown}

      # Fleet Nostr endpoints; override with the dev infrastructure endpoints
      # when starting the dev profile.
      GT_NOSTR_ENABLED: "1"
      GT_NOSTR_CONFIG: /gt/${GT_RIG:-gastown}/settings/nostr.json
      GT_NOSTR_WRITE_RELAYS: ${GT_NOSTR_WRITE_RELAYS:-wss://relay.sharegap.net}
      GT_NOSTR_READ_RELAYS: ${GT_NOSTR_READ_RELAYS:-wss://relay.sharegap.net}
      GT_NOSTR_BLOSSOM_SERVERS: ${GT_NOSTR_BLOSSOM_SERVERS:-https://blossom.sharegap.net}

      # External Dolt server; defaults match the local Gastown convention.
      GT_DOLT_HOST: ${GT_DOLT_HOST:-127.0.0.1}
      GT_DOLT_PORT: ${GT_DOLT_PORT:-3307}

      # Claude CLI credentials inherited by interactive tmux agents.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}

      # Optional migration/sunset flags (defaults preserve local behavior)
      GT_EVENTS_LOCAL: ${GT_EVENTS_LOCAL:-1}
      GT_FEED_CURATOR: ${GT_FEED_CURATOR:-1}
      GT_CONVOY_LOCAL: ${GT_CONVOY_LOCAL:-1}
    working_dir: /gt/${GT_RIG:-gastown}
    volumes:
      - ./rigs/${GT_RIG:-gastown}:/gt/${GT_RIG:-gastown}
      - ./runtime/${GT_RIG:-gastown}:/gt/${GT_RIG:-gastown}/.runtime
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f '[g]t daemon run' >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  agentloop:
    image: gastown:local
    # Optional — activate with: docker compose --profile agent up
    # Requires agents.json config; see docs/examples/agents-api.json
    profiles: [agent]
    depends_on: [deacon]
    command:
      - "agentloop"
      - "run"
      - "--rig"
      - "${GT_RIG:-gastown}"
      - "--role"
      - "${GT_AGENT_ROLE:-witness}"
      - "--instance"
      - "${GT_AGENT_INSTANCE:-agent1}"
      - "--agents-config"
      - "/gt/${GT_RIG:-gastown}/settings/agents.json"
      - "--agent"
      - "${GT_AGENT_ID:-claude-api}"
      - "--workdir"
      - "/gt/${GT_RIG:-gastown}"
      # Optional: seed an initial task so the container does work immediately
      # - "--task"
      # - "${GT_AGENT_TASK:-}"
      # Optional: poll for work via `gt prime` and auto-assign work
      # - "--prime-interval"
      # - "${GT_AGENT_PRIME_INTERVAL:-30s}"
    environment:
      GT_RIG: ${GT_RIG:-gastown}
      GT_TOWN_ROOT: /gt/${GT_RIG:-gastown}
      GT_ROOT: /gt/${GT_RIG:-gastown}

      GT_NOSTR_ENABLED: "1"
      GT_NOSTR_CONFIG: /gt/${GT_RIG:-gastown}/settings/nostr.json
      GT_NOSTR_WRITE_RELAYS: ${GT_NOSTR_WRITE_RELAYS:-wss://relay.sharegap.net}
      GT_NOSTR_READ_RELAYS: ${GT_NOSTR_READ_RELAYS:-wss://relay.sharegap.net}
      GT_NOSTR_BLOSSOM_SERVERS: ${GT_NOSTR_BLOSSOM_SERVERS:-https://blossom.sharegap.net}
      GT_DOLT_HOST: ${GT_DOLT_HOST:-deacon}
      GT_DOLT_PORT: ${GT_DOLT_PORT:-3307}

      # LLM creds referenced via agents.json (api.api_key: "$OPENAI_API_KEY" etc.)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    working_dir: /gt/${GT_RIG:-gastown}
    volumes:
      - ./rigs/${GT_RIG:-gastown}:/gt/${GT_RIG:-gastown}
      - ./runtime/${GT_RIG:-gastown}:/gt/${GT_RIG:-gastown}/.runtime
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f '[g]t agentloop run' >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  mcp:
    image: gastown:local
    # Optional — activate with: docker compose --profile mcp up
    # Network exposure requires GT_MCP_TOKEN; host publishing defaults to loopback.
    profiles: [mcp]
    depends_on: [deacon]
    command:
      - "mcp"
      - "serve"
      - "--addr"
      - "0.0.0.0:9500"
      - "--rig"
      - "${GT_RIG:-gastown}"
      - "--workdir"
      - "/gt/${GT_RIG:-gastown}"
      - "--auth-token"
      - "${GT_MCP_TOKEN:-}"
    environment:
      GT_RIG: ${GT_RIG:-gastown}
      GT_TOWN_ROOT: /gt/${GT_RIG:-gastown}
      GT_ROOT: /gt/${GT_RIG:-gastown}

      GT_NOSTR_ENABLED: "1"
      GT_NOSTR_CONFIG: /gt/${GT_RIG:-gastown}/settings/nostr.json
      GT_NOSTR_WRITE_RELAYS: ${GT_NOSTR_WRITE_RELAYS:-wss://relay.sharegap.net}
      GT_NOSTR_READ_RELAYS: ${GT_NOSTR_READ_RELAYS:-wss://relay.sharegap.net}
      GT_NOSTR_BLOSSOM_SERVERS: ${GT_NOSTR_BLOSSOM_SERVERS:-https://blossom.sharegap.net}
      GT_DOLT_HOST: ${GT_DOLT_HOST:-deacon}
      GT_DOLT_PORT: ${GT_DOLT_PORT:-3307}
    working_dir: /gt/${GT_RIG:-gastown}
    ports:
      - "${GT_MCP_BIND_HOST:-127.0.0.1}:${GT_MCP_PORT:-9500}:9500"
    volumes:
      - ./rigs/${GT_RIG:-gastown}:/gt/${GT_RIG:-gastown}
      - ./runtime/${GT_RIG:-gastown}:/gt/${GT_RIG:-gastown}/.runtime
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9500/mcp/health"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Optional: Flotilla web UI (activate with --profile ui)
  # ---------------------------------------------------------------------------
  flotilla:
    build:
      context: ${GT_FLOTILLA_PATH:-../flotilla}
      dockerfile: Dockerfile
    profiles: [ui]
    ports:
      - "${GT_FLOTILLA_PORT:-1847}:1847"
    environment:
      VITE_FORCE_RELAYS: ${GT_NOSTR_READ_RELAYS:-wss://relay.sharegap.net}
      VITE_DEFAULT_BLOSSOM: ${GT_NOSTR_BLOSSOM_SERVERS:-https://blossom.sharegap.net}
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Optional: Local LLM via Ollama (activate with --profile llm)
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    profiles: [llm]
    ports:
      - "${GT_OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama-data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  # CPU-only variant (activate with --profile llm-cpu)
  ollama-cpu:
    image: ollama/ollama:latest
    profiles: [llm-cpu]
    ports:
      - "${GT_OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped

# =============================================================================
# Named volumes for persistent data
# =============================================================================
volumes:
  relay-data:
    driver: local
  blossom-data:
    driver: local
  ollama-data:
    driver: local
