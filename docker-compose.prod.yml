# =============================================================================
# Gas Town — Production Overrides
# =============================================================================
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# This file:
#   - Disables build (uses pre-built images)
#   - Adds resource limits
#   - Enables restart policies
#   - Tightens security
# =============================================================================

services:
  deacon:
    image: gastown:${GT_VERSION:-latest}
    build: !reset null
    restart: always
    environment:
      GT_NOSTR_ENABLED: "1"
      GT_LOG_LEVEL: info
      GT_NOSTR_WRITE_RELAYS: ${GT_NOSTR_WRITE_RELAYS:-wss://relay.sharegap.net}
      GT_NOSTR_READ_RELAYS: ${GT_NOSTR_READ_RELAYS:-wss://relay.sharegap.net}
      GT_NOSTR_BLOSSOM_SERVERS: ${GT_NOSTR_BLOSSOM_SERVERS:-https://blossom.sharegap.net}
      # In production, sunset local paths once validated
      GT_EVENTS_LOCAL: ${GT_EVENTS_LOCAL:-0}
      GT_FEED_CURATOR: ${GT_FEED_CURATOR:-0}
      GT_CONVOY_LOCAL: ${GT_CONVOY_LOCAL:-0}
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  agentloop:
    image: gastown:${GT_VERSION:-latest}
    build: !reset null
    restart: always
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  mcp:
    image: gastown:${GT_VERSION:-latest}
    build: !reset null
    restart: always
    ports:
      - "${GT_MCP_BIND_HOST:-127.0.0.1}:${GT_MCP_PORT:-9500}:9500"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "25m"
        max-file: "3"

  relay:
    restart: always
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "25m"
        max-file: "3"

  blossom:
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
